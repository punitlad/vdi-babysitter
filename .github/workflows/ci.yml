name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run unit tests with coverage
        run: |
          pytest --cov=vdi_babysitter --cov-fail-under=90 --cov-report=term-missing

      - name: Install CLI
        run: pip install -e .

      - name: Smoke test
        run: |
          vdi-babysitter --help
          vdi-babysitter citrix connect --help
